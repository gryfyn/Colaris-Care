name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Staged file inventory
        run: node scripts/check-staged-application.mjs

      - name: Unit tests
        run: npm test -- --runInBand

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
