name: Production Checks

on:
  workflow_dispatch:
    inputs:
      run_playwright:
        description: Run Playwright smoke tests against configured base URL
        type: boolean
        default: false

jobs:
  production-config:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify production config
        run: node scripts/verify-production-config.mjs
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_SSL: 'true'
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          TENANT_ENCRYPTION_KEY: ${{ secrets.TENANT_ENCRYPTION_KEY }}
          JWT_PRIVATE_KEY_BASE64: ${{ secrets.JWT_PRIVATE_KEY_BASE64 }}
          JWT_PUBLIC_KEY_BASE64: ${{ secrets.JWT_PUBLIC_KEY_BASE64 }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}

      - name: Run Playwright smoke
        if: ${{ inputs.run_playwright }}
        run: npx playwright test tests/e2e/production-smoke.spec.js
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_STAFF_EMAIL: ${{ secrets.E2E_STAFF_EMAIL }}
          E2E_STAFF_PASSWORD: ${{ secrets.E2E_STAFF_PASSWORD }}
