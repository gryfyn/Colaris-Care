# Dependable Care — full production stack.
#
#   docker compose up -d --build
#
# Brings up Postgres, runs DB migrations once, then starts the app.
# All config comes from .env.production (copy from .env.production.example).
# JWT signing keys are mounted read-only from ./secrets — never baked into the image.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies db/db.sql + db/migrations/*.sql, then exits.
  migrate:
    build: .
    env_file: .env
    command: ["node", "scripts/migrate-db.js"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  pgdata:
